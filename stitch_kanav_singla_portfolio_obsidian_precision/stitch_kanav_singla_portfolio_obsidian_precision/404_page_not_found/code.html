<script>
        // Micro-interaction: Random Trace ID generation for flavor
        document.addEventListener('DOMContentLoaded', () => {
            const traceEl = document.getElementById('trace-id');
            const randomID = 'KS-' + Math.floor(Math.random() * 9000 + 1000);
            if (traceEl) traceEl.innerText = randomID;

            // Subtle mouse tracking glow effect for the 404 container
            const container = document.querySelector('main');
            container.addEventListener('mousemove', (e) => {
                const { clientX, clientY } = e;
                const rect = container.getBoundingClientRect();
                const x = clientX - rect.left;
                const y = clientY - rect.top;
                
                // We can use a CSS custom property to track the mouse for a spotlight effect if desired
                container.style.setProperty('--mouse-x', `${x}px`);
                container.style.setProperty('--mouse-y', `${y}px`);
            });
        });
    </script>
